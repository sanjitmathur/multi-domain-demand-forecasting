# Dashboard theme only.
# [server] / [ui] / [browser] are intentionally omitted — Streamlit Community
# Cloud controls its own server config and rejects overrides at runtime.

[theme]
base = "dark"
primaryColor = "#8B7CFF"
backgroundColor = "#07090F"
secondaryBackgroundColor = "#0E1320"
textColor = "#F4F6FB"

[client]
toolbarMode = "minimal"
